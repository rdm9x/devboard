<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n="chat.page.title">Chat · devboard</title>
<link rel="stylesheet" href="/static/style.css">
<link rel="stylesheet" href="/static/css/tour.css">
<style>
  /* ============================================================
     Chat Page Layout: 3 columns (20% / 50% / 30%)
     Right column split 30% / 70% vertically
     ============================================================ */

  .chat-app {
    display: grid;
    grid-template-columns: 20% 50% 30%;
    gap: 1px;
    height: 100vh;
    background: var(--border);
  }

  /* ===== Left Column: Threads List (20%) ===== */
  .chat-threads {
    background: var(--glass-bg);
    backdrop-filter: var(--glass-blur);
    -webkit-backdrop-filter: var(--glass-blur);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    min-height: 0;
    padding: 16px 12px;
    overflow-y: auto;
  }

  .chat-threads-header {
    font-weight: 600;
    color: var(--text);
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }

  .chat-threads-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex: 1;
    min-height: 0;
    overflow-y: auto;
  }

  .thread-item {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 8px;
    cursor: pointer;
    transition: background 0.12s ease, border-color 0.12s ease;
    color: var(--text-2);
    font-size: 12px;
    text-align: left;
    min-height: 0;
  }

  .thread-item:hover {
    background: var(--surface-3);
    border-color: var(--border-2);
  }

  .thread-item.active {
    background: var(--accent-soft);
    border-color: var(--accent);
    color: var(--accent);
  }

  .thread-item.hidden {
    display: none;
  }

  #archive-toggle:hover {
    background: var(--surface-2);
  }

  .archive-thread-item {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 8px;
    cursor: pointer;
    transition: background 0.12s ease, border-color 0.12s ease;
    color: var(--text-3);
    font-size: 12px;
    text-align: left;
    min-height: 0;
    opacity: 0.7;
  }

  .archive-thread-item:hover {
    background: var(--surface-3);
    border-color: var(--border-2);
    opacity: 1;
  }

  .archive-thread-item.active {
    background: var(--accent-soft);
    border-color: var(--accent);
    color: var(--accent);
    opacity: 1;
  }

  /* ===== Center Column: Message Area (50%) ===== */
  .chat-center {
    background: var(--bg-1);
    display: flex;
    flex-direction: column;
    min-height: 0;
    border-right: 1px solid var(--border);
  }

  .chat-header {
    background: var(--glass-bg-2);
    backdrop-filter: var(--glass-blur);
    -webkit-backdrop-filter: var(--glass-blur);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px;
    border-radius: 0;
    min-height: 0;
  }

  .chat-header h2 {
    margin: 0;
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
  }

  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    min-height: 0;
  }

  .message-placeholder {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px;
    color: var(--text-3);
    font-size: 12px;
  }

  .chat-input-area {
    background: var(--glass-bg-2);
    backdrop-filter: var(--glass-blur);
    -webkit-backdrop-filter: var(--glass-blur);
    border-top: 1px solid var(--border);
    padding: 12px 16px;
    display: flex;
    gap: 8px;
    min-height: 0;
    align-items: flex-end;
  }

  .chat-input-area textarea,
  .chat-input-area input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    color: var(--text);
    font: inherit;
    font-size: 12px;
    resize: none;
    max-height: 100px;
  }

  .chat-input-area textarea:focus,
  .chat-input-area input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 2px var(--accent-soft);
  }

  .chat-input-area button {
    padding: 8px 12px;
    font-size: 12px;
    min-width: 60px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.12s ease;
  }

  .chat-input-area button:hover:not(:disabled) {
    background: var(--accent-hover);
  }

  .chat-input-area button:disabled {
    background: var(--surface-3);
    color: var(--text-3);
    cursor: not-allowed;
    opacity: 0.6;
  }

  /* ===== Message Card ===== */
  .message-card {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px;
    animation: fadeIn 0.2s ease-in-out;
  }

  @keyframes fadeIn {
    from {
      opacity: 0;
      transform: translateY(4px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .message-text h1,
  .message-text h2,
  .message-text h3 {
    margin: 8px 0 4px 0;
    font-size: 1.2em;
    color: var(--text);
  }

  .message-text strong {
    color: var(--accent);
    font-weight: 600;
  }

  .message-text em {
    font-style: italic;
    color: var(--text-2);
  }

  .message-text code {
    background: var(--surface-3);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 2px 4px;
    font-family: 'Monaco', 'Menlo', 'Consolas', monospace;
    font-size: 11px;
    color: var(--accent);
  }

  .message-text pre {
    background: var(--surface-3);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 10px;
    overflow-x: auto;
    margin: 8px 0;
  }

  .message-text pre code {
    background: none;
    border: none;
    padding: 0;
    color: var(--text-2);
    font-size: 11px;
  }

  .message-text ul {
    margin: 8px 0;
    padding-left: 20px;
  }

  .message-text li {
    margin: 4px 0;
    list-style: disc;
  }

  .message-text p {
    margin: 4px 0;
  }

  /* ===== Right Column: 2 Blocks Split Vertically (30%) ===== */
  .chat-right {
    display: grid;
    grid-template-rows: 30% 70%;
    gap: 1px;
    background: var(--border);
    min-height: 0;
  }

  .chat-right-block {
    background: var(--glass-bg);
    backdrop-filter: var(--glass-blur);
    -webkit-backdrop-filter: var(--glass-blur);
    border: 1px solid var(--border);
    border-radius: 0;
    display: flex;
    flex-direction: column;
    min-height: 0;
    overflow: hidden;
  }

  .chat-right-block:first-child {
    border-bottom: none;
    border-radius: 0;
  }

  .chat-right-block-header {
    background: var(--surface-2);
    border-bottom: 1px solid var(--border);
    padding: 12px;
    font-weight: 600;
    font-size: 12px;
    color: var(--text);
    min-height: 0;
  }

  .chat-right-block-content {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    font-size: 12px;
    color: var(--text-3);
    min-height: 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  /* ===== Planning Create Form ===== */
  .planning-create-form {
    display: flex;
    flex-direction: column;
    gap: 10px;
    font-size: 11px;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .form-label {
    font-weight: 500;
    color: var(--text-2);
    font-size: 11px;
  }

  .form-control {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 6px 8px;
    color: var(--text);
    font: inherit;
    font-size: 11px;
  }

  .form-control:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 2px var(--accent-soft);
  }

  .departments-checkboxes {
    display: flex;
    flex-direction: column;
    gap: 4px;
    max-height: 80px;
    overflow-y: auto;
  }

  .dept-checkbox {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px;
    cursor: pointer;
    border-radius: 3px;
    transition: background 0.12s ease;
  }

  .dept-checkbox:hover {
    background: var(--surface-3);
  }

  .dept-checkbox input[type="checkbox"] {
    width: 14px;
    height: 14px;
    cursor: pointer;
  }

  .dept-checkbox label {
    cursor: pointer;
    flex: 1;
    color: var(--text-2);
    font-size: 11px;
  }

  .btn-primary,
  .btn-secondary {
    padding: 6px 10px;
    border: none;
    border-radius: 4px;
    font: inherit;
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.12s ease, opacity 0.12s ease;
  }

  .btn-primary {
    background: var(--accent);
    color: white;
  }

  .btn-primary:hover:not(:disabled) {
    background: var(--accent-hover);
  }

  .btn-primary:disabled,
  .btn-primary.disabled {
    background: var(--surface-3);
    color: var(--text-3);
    cursor: not-allowed;
    opacity: 0.6;
  }

  .btn-secondary {
    background: var(--surface-2);
    color: var(--text-2);
  }

  .btn-secondary:hover {
    background: var(--surface-3);
  }

  /* ===== Tasks List ===== */
  .tasks-list {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 8px;
  }

  .task-item {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 8px;
    cursor: pointer;
    transition: background 0.12s ease, border-color 0.12s ease;
    font-size: 11px;
    color: var(--text-2);
  }

  .task-item:hover {
    background: var(--surface-3);
    border-color: var(--border-2);
  }

  .task-item-title {
    font-weight: 500;
    color: var(--text);
    margin-bottom: 2px;
  }

  .task-item-meta {
    font-size: 10px;
    color: var(--text-3);
    display: flex;
    gap: 6px;
  }

  .task-item-badge {
    display: inline-block;
    padding: 2px 6px;
    border-radius: 3px;
    background: var(--accent-soft);
    color: var(--accent);
    font-size: 10px;
    font-weight: 500;
  }

  .loading {
    color: var(--text-3);
    font-size: 11px;
    text-align: center;
    padding: 8px;
  }

  /* ============================================================
     Responsive: Mobile Stack (under 768px)
     ============================================================ */

  @media (max-width: 768px) {
    .chat-app {
      grid-template-columns: 1fr;
      grid-template-rows: auto 1fr auto;
    }

    .chat-threads {
      display: none; /* Hide threads on mobile, or make it a modal */
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 100;
      border-radius: 0;
      padding: 12px;
    }

    .chat-threads.mobile-visible {
      display: flex;
    }

    .chat-center {
      grid-column: 1;
      grid-row: 1 / 3;
    }

    .chat-right {
      grid-column: 1;
      grid-row: 3;
      grid-template-rows: auto auto;
      max-height: auto;
    }

    .chat-right-block {
      max-height: 200px;
    }
  }

  @media (max-width: 480px) {
    body {
      font-size: 12px;
    }

    .chat-input-area {
      flex-direction: column;
    }

    .chat-input-area button {
      width: 100%;
    }
  }

  /* ============================================================
     Dark Theme Support (existing style.css body-theme mechanism)
     ============================================================ */

  body[data-theme="dark"] .chat-app {
    background: var(--border);
  }

  body[data-theme="dark"] .chat-threads,
  body[data-theme="dark"] .chat-header,
  body[data-theme="dark"] .chat-input-area,
  body[data-theme="dark"] .chat-right-block {
    background: var(--glass-bg);
  }

  body[data-theme="dark"] .chat-center {
    background: var(--bg-1);
  }
</style>
</head>
<body>

<!-- Chat Layout: 3 columns -->
<div class="chat-app">

  <!-- LEFT: Threads List (20%) -->
  <div class="chat-threads">
    <div class="chat-threads-header">💬 Threads</div>

    <!-- Search Input -->
    <div style="margin-bottom: 12px;">
      <input
        type="text"
        id="threads-search"
        placeholder="Search…"
        style="
          width: 100%;
          padding: 6px 8px;
          font-size: 12px;
          border: 1px solid var(--border);
          border-radius: 4px;
          background: var(--surface);
          color: var(--text);
        "
      >
    </div>

    <!-- Active Threads List -->
    <div class="chat-threads-list" id="threads-active-list">
      <div class="loading" style="font-size: 11px; color: var(--text-3); text-align: center; padding: 16px;">Loading…</div>
    </div>

    <!-- Archive Section (Collapsible) -->
    <div style="margin-top: 12px; border-top: 1px solid var(--border); padding-top: 12px;">
      <div
        id="archive-toggle"
        style="
          display: flex;
          align-items: center;
          gap: 6px;
          cursor: pointer;
          padding: 6px 4px;
          border-radius: 4px;
          transition: background 0.12s ease;
          user-select: none;
        "
      >
        <span id="archive-icon" style="font-size: 11px; color: var(--text-3);">▶</span>
        <span style="font-size: 12px; color: var(--text-2); font-weight: 500;" data-i18n="chat.archive.title">📁 Archive</span>
        <span id="archive-count" style="font-size: 11px; color: var(--text-3);">(0)</span>
      </div>

      <div id="threads-archive-list" style="display: none; margin-top: 8px;">
        <!-- Archive threads will be inserted here -->
      </div>
    </div>
  </div>

  <!-- CENTER: Message Area (50%) -->
  <div class="chat-center">
    <div class="chat-header">
      <h2>Conversation</h2>
    </div>
    <div class="chat-messages">
      <div class="message-placeholder">Message placeholder 1</div>
      <div class="message-placeholder">Message placeholder 2</div>
      <div class="message-placeholder">Message placeholder 3</div>
    </div>
    <div class="chat-input-area">
      <textarea
        id="message-input"
        placeholder="Type message… (Cmd/Ctrl+Enter to send)"
        style="flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; color: var(--text); font: inherit; font-size: 12px; resize: none; max-height: 100px;"
        data-i18n-attr="placeholder:chat.input_placeholder"
      ></textarea>
      <button id="btn-send-message" class="primary" data-i18n="chat.send_button" title="Send message (Cmd/Ctrl+Enter)">Send</button>
      <button id="btn-start-session" class="secondary" style="min-width: 120px;" title="Start team session with this thread context" data-i18n="chat.start_session_button">🚀 Start Session</button>
    </div>
  </div>

  <!-- RIGHT: 2 Blocks Split Vertically (30%) -->
  <div class="chat-right">
    <!-- Top Block (30% of right column): Create Planning Session -->
    <div class="chat-right-block">
      <div class="chat-right-block-header">📋 <span data-i18n="planning.create.title">Собрать планёрку</span></div>
      <div class="chat-right-block-content" id="planning-create-content">
        <form id="form-planning-create" class="planning-create-form">
          <!-- Departments with checkboxes -->
          <div class="form-group">
            <label class="form-label" data-i18n="planning.create.departments_label">Отделы</label>
            <div class="departments-checkboxes" id="planning-departments">
              <p class="loading" data-i18n="planning.loading">Загрузка…</p>
            </div>
          </div>

          <!-- Rounds dropdown -->
          <div class="form-group">
            <label class="form-label" for="planning-rounds" data-i18n="planning.create.rounds_label">Раундов</label>
            <select id="planning-rounds" name="rounds" class="form-control">
              <option value="1">1</option>
              <option value="2">2</option>
              <option value="3" selected>3</option>
              <option value="4">4</option>
              <option value="5">5</option>
            </select>
          </div>

          <!-- Topic input -->
          <div class="form-group">
            <label class="form-label" for="planning-topic" data-i18n="planning.create.topic_label">Тема</label>
            <input
              type="text"
              id="planning-topic"
              name="topic"
              class="form-control"
              placeholder="Введи тему планёрки…"
              data-i18n-attr="placeholder:planning.create.topic_placeholder">
          </div>

          <!-- Create button (disabled) -->
          <button
            type="button"
            class="btn-primary disabled"
            id="btn-planning-create"
            title="Phase 3b"
            data-i18n-attr="title:planning.create.button_disabled_hint"
            data-i18n="planning.create.button"
            disabled>
            Создать планёрку
          </button>
        </form>
      </div>
    </div>

    <!-- Bottom Block (70% of right column): Managing Director Tasks -->
    <div class="chat-right-block">
      <div class="chat-right-block-header">📌 <span data-i18n="managing_director_tasks.title">Задачи Управляющего</span></div>
      <div class="chat-right-block-content" id="tasks-content">
        <div id="tasks-list" class="tasks-list">
          <p class="loading" data-i18n="managing_director_tasks.loading">Загрузка…</p>
        </div>
        <button id="btn-add-managing-director-task" class="btn-secondary" data-i18n="managing_director_tasks.add_button">
          + Добавить задачу
        </button>
      </div>
    </div>
  </div>

</div>

<script src="/static/js/i18n.js"></script>
<script src="/static/js/chat.js"></script>

</body>
</html>
