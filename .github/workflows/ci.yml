name: ci

# Основной CI: lint + unit-тесты на каждый PR и push в main.
# E2E (Playwright) живут отдельно в e2e.yml — тяжёлые, гоняем только на main.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    env:
      # Кириллические пути (mcp_сервер/, дашборд/) — форсим UTF-8 для pytest/ruff.
      PYTHONIOENCODING: utf-8
      PYTHONUTF8: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          # Подпроекты как editable — чтобы pytest нашёл пакеты pride_tasks/ и dashboard/.
          pip install -e mcp_сервер
          pip install -e дашборд

      - name: Pre-commit hooks
        # Дублирует локальный E8.4: ruff check/format + базовая гигиена файлов.
        # Если хук "ruff --fix" что-то поправил — упадём с ненулевым кодом (так и задумано).
        run: |
          pip install pre-commit
          pre-commit run --all-files --show-diff-on-failure

      - name: Ruff lint
        # Явный прогон ruff (без --fix) поверх pre-commit — на случай если pre-commit
        # пропустит файлы из-за exclude-паттернов.
        run: ruff check .

      - name: Mypy (non-blocking)
        # mypy в .pre-commit-config.yaml закомментирован до согласованного mypy.ini.
        # Здесь гоняем "для информации" — не падать на ошибках.
        continue-on-error: true
        run: |
          pip install mypy
          mypy mcp_сервер/pride_tasks дашборд || true

      - name: Pytest with coverage
        # Исключаем tests/e2e/ — это playwright, для них отдельный workflow (e2e.yml).
        run: |
          pytest \
            mcp_сервер/tests/ \
            дашборд/tests/ \
            tests/test_llm_factory.py \
            --cov=mcp_сервер/pride_tasks \
            --cov=дашборд \
            --cov-report=xml \
            --cov-report=term \
            -v

      - name: Upload coverage to Codecov
        # Гоняем только если в репо настроен CODECOV_TOKEN (для приватных репо обязателен,
        # для публичных — опционален). Если токена нет — шаг пропускается, CI не падает.
        if: env.CODECOV_TOKEN != '' && matrix.python-version == '3.12'
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
