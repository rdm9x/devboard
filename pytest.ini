[pytest]
# По умолчанию каждый подпроект запускается со своим venv:
#   mcp_сервер/.venv/bin/pytest mcp_сервер/tests/
#   дашборд/.venv/bin/pytest    дашборд/tests/
# Объединённый прогон — через ./команды/pride-team-test.sh
# E2E (Playwright) — отдельным запуском: pytest tests/e2e/
testpaths = mcp_сервер/tests
python_files = test_*.py
addopts = -v
markers =
    e2e: end-to-end сценарии через Playwright (требуется браузер, см. tests/e2e/)
